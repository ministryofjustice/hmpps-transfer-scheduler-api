name: SchemaSpy report

on:
  workflow_call:
    inputs:
      java_version:
        description: Java version
        type: string
        default: '25'
      java_options:
        description: Java options
        type: string
        default: '-Xmx512m -XX:ParallelGCThreads=2 -XX:ConcGCThreads=2 -Djava.util.concurrent.ForkJoinPool.common.parallelism=2 -Dorg.gradle.daemon=false -Dkotlin.compiler.execution.strategy=in-process'
      docker_compose_file:
        description: Path to Docker Compose file to start required containers
        type: string
        required: true
      init_db_cli:
        description: Command line to initialise database
        type: string
        default: './gradlew -Pinit-db=true test --tests uk.gov.justice.digital.hmpps.transferschedulerapi.integration.InitialiseDatabase'
      database_name:
        description: Database name
        type: string
        required: true
      database_user:
        description: Database user name
        type: string
        required: true
      database_password:
        description: Database user password
        type: string
        required: true
      database_schema:
        description: Database schema name
        type: string
        required: true

jobs:
  schema-spy:
    name: Schema Spy report generation
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: gradle
          cache-dependency-path: |
            *.gradle*
            **/gradle-wrapper.properties

      - name: Initialise database
        shell: bash
        run: |
          docker compose -f ${{ inputs.docker_compose_file }} up -d
          export JAVA_OPTS="${{ inputs.java_options }}"
          ${{ inputs.init_db_cli }}

      - name: Generate database schema report
        uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/database_schema_report@c89a206b6b32888d13f6aec01af0f7694df6b42f # v1
        with:
          database_name: ${{ inputs.database_name }}
          schema: ${{ inputs.database_schema }}
          user: ${{ inputs.database_user }}
          password: ${{ inputs.database_password }}

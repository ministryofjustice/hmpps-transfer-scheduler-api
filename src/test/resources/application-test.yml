      data-source-properties:
        sslmode: 'disable'

client:
  id: transfer-scheduler
  secret: transfer-scheduler

db:
  server: "localhost:5432"
  name: "transfer"
  user: "transfer"
  pass: "5ch3du13r"

hmpps.sqs:
  provider: localstack
  queues:
    hmppseventtestqueue:
      queueName: ${random.uuid}
      dlqName: ${random.uuid}
      subscribeTopicId: hmppseventtopic
    hmppsdomaineventsqueue:
      queueName: ${random.uuid}
      dlqName: ${random.uuid}
      subscribeTopicId: hmppseventtesttopic
    offendereventsqueue:
      queueName: ${random.uuid}
      dlqName: ${random.uuid}
      subscribeTopicId: offendereventstopic
  topics:
    hmppseventtopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}
    hmppseventtesttopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}
    offendereventstopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}

springdoc:

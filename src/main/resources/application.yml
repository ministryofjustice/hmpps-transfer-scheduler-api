info.app:
  name: HMPPS Transfer Scheduler Api
  version: 1.0

spring:
  application:
    name: hmpps-transfer-scheduler-api

  datasource:
    url: 'jdbc:postgresql://${db.server}/${db.name}'
    username: ${db.user}
    password: ${db.pass}

    hikari:
      connectionTimeout: 1000
      validationTimeout: 500
      maximumPoolSize: 16
      auto-commit: false
      data-source-properties:
        sslmode: "verify-full"

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/schema,classpath:db/data

  jpa:
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob.non_contextual_creation: true
          batch_size: 1000
          fetch_size: 1000
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
        order_inserts: true
        order_updates: true
      org.hibernate.envers:
        audit_table_suffix: _audit
        revision_field_name: rev_id
        revision_type_field_name: rev_type
        modified_flag_suffix: _modified
        store_data_at_delete: true
        do_not_audit_optimistic_locking_field: false
    open-in-view: false

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    default-property-inclusion: non_null

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        registration:
          default:
            provider: hmpps-auth
            client-id: ${client.id}
            client-secret: ${client.secret}
            authorization-grant-type: client_credentials
            scope: read
        provider:
          hmpps-auth:
            token-uri: ${integration.hmpps-auth.url}/oauth/token

  http:
    codecs:
      max-in-memory-size: 10MB

  threads.virtual.enabled: true

  web:
    error:
      include-message: always

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

springdoc:
  paths-to-exclude: "/queue-admin/**"
  api-docs:
    enabled: false
    version: OPENAPI_3_0
  swagger-ui:
    enabled: false

service:
  active-prisons:
  domain-events:
    poll-interval: PT0s
    batch-size: 10